{% extends "base.html" %}


{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h1>
            👥 Utenti
        </h1>

        <p class="text-muted">
            Gestisci gli utenti della piattaforma
        </p>
    </div>


    <a href="{% url 'add_user' %}" class="btn btn-primary">
        + Nuovo utente
    </a>

</div>



<div class="card">

    <div class="card-body">

        <table class="table table-striped">

            <thead>

                <tr>
                    <th>Username</th>
                    <th>Email</th>
                </tr>

            </thead>


            <tbody>


            {% for user in users %}

                <tr>

                    <td>
                    {{ user.name }}
                    </td>

                    <td>
                    {{ user.email }}
                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="2">
                        Nessun utente presente
                    </td>

                </tr>

            {% endfor %}


            </tbody>

        </table>


    </div>

</div>


{% endblock %}
