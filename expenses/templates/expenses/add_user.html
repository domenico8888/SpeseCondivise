{% extends 'base.html' %}


{% block content %}

<h1>
➕ Nuovo utente
</h1>


<form method="post">

    {% csrf_token %}


    <div class="mb-3">
        <label>
            Username
        </label>

        <input
            type="text"
            name="username"
            class="form-control"
        >

    </div>


    <div class="mb-3">

        <label>
            Email
        </label>

        <input
            type="email"
            name="email"
            class="form-control"
        >

    </div>


    <button class="btn btn-success">
        Salva utente
    </button>


</form>


{% endblock %}
